# Local development / production shape (architecture.md Section 15).
# The first vertical slice (Slice 1) is real and running here: Alembic
# migrations run before Uvicorn starts (backend/Dockerfile CMD), and the
# FastAPI lifespan performs idempotent Slice 1 policy seeding once
# migrations have completed (architecture.md Section 11.2). The api
# service exposes GET /health, POST /devices/{device_id}/config,
# GET /incidents, POST /incidents/{incident_id}/resolve, and (Day 9)
# GET /devices/{device_id}/drift.
#
# Host ports are overridable so a repeatable, isolated smoke run
# (scripts/compose_smoke.py, Day 6A) can avoid colliding with a native
# PostgreSQL install on 5432 or any other local service, without changing
# behavior for an ordinary `docker compose up` (defaults unchanged).
#
# E2E uses a separate, disposable compose.e2e.yml (Section 15.1) — not
# created yet; it depends on the Playwright HTTP-mode suite, which is
# still deferred (see CLAUDE.md "Current Phase").
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: meta_rne
      POSTGRES_USER: meta_rne
      POSTGRES_PASSWORD: meta_rne
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${META_RNE_DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta_rne -d meta_rne"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://meta_rne:meta_rne@db:5432/meta_rne
      LOG_LEVEL: info
      # Local Compose-development default: the Vite dev server origin the
      # React dashboard (`frontend/`, built as of Day 6B) runs on when
      # started separately (not as a Compose service — no frontend image
      # or Compose service exists). Empty/unset means CORS stays disabled
      # (api/cors.py's own Python-level default) — this only takes effect
      # because it's set here.
      META_RNE_CORS_ALLOWED_ORIGINS: ${META_RNE_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${META_RNE_API_HOST_PORT:-8080}:8080"
    # Dockerfile's HEALTHCHECK (Python stdlib, no curl) is inherited from
    # the image; not redeclared here.

volumes:
  pgdata:
