# Local development / production shape (architecture.md Section 15).
# E2E uses a separate, disposable compose.e2e.yml (Section 15.1) — not
# created yet; it depends on Slice 1 business logic that doesn't exist
# during Day 2 (see CLAUDE.md "Current Phase").
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: meta_rne
      POSTGRES_USER: meta_rne
      POSTGRES_PASSWORD: meta_rne
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta_rne -d meta_rne"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://meta_rne:meta_rne@db:5432/meta_rne
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    # Dockerfile's HEALTHCHECK (Python stdlib, no curl) is inherited from
    # the image; not redeclared here.

volumes:
  pgdata:
