name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      # --- 1-4: format, lint, type-check, tests (no Docker needed) ---

      - name: ruff format --check
        working-directory: backend
        run: ruff format --check .

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: mypy
        working-directory: backend
        run: mypy src

      - name: pytest
        working-directory: backend
        run: pytest

      # --- 5: Docker Compose smoke test (proves reproducible startup) ---

      - name: docker compose config
        run: docker compose config

      - name: Compose smoke test — build and start
        run: docker compose up --build -d

      - name: Compose smoke test — wait for both services to become healthy
        run: |
          for i in $(seq 1 30); do
            api_id="$(docker compose ps -q api)"
            db_id="$(docker compose ps -q db)"
            if [ -z "$api_id" ] || [ -z "$db_id" ]; then
              echo "containers not created yet, waiting..."
              sleep 2
              continue
            fi
            api_status=$(docker inspect --format='{{.State.Health.Status}}' "$api_id" 2>/dev/null || echo "starting")
            db_status=$(docker inspect --format='{{.State.Health.Status}}' "$db_id" 2>/dev/null || echo "starting")
            echo "api=$api_status db=$db_status"
            if [ "$api_status" = "healthy" ] && [ "$db_status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::services did not become healthy in time"
          docker compose ps
          docker compose logs
          exit 1

      - name: Compose smoke test — GET /health
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://localhost:8080/health", timeout=5) as response:
              status = response.status
              body = json.loads(response.read())

          assert status == 200, f"expected HTTP 200, got {status}"
          assert body == {"status": "ok"}, f"unexpected body: {body}"
          print("health check passed:", body)
          PY

      - name: Compose smoke test — confirm Alembic completed before Uvicorn started
        run: |
          docker compose logs api | grep -q "Context impl PostgresqlImpl"
          docker compose exec -T db psql -U meta_rne -d meta_rne -c '\dt alembic_version' | grep -q alembic_version

      - name: Compose smoke test — tear down
        if: always()
        run: docker compose down -v
