name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      # --- format, lint, type-check, tests (no Docker needed) ---
      # Docker Compose smoke validation moved to the dedicated
      # compose-smoke job below (Day 6A) — this job stays Docker-free and
      # fast; it no longer builds or starts the stack itself.

      - name: ruff format --check
        working-directory: backend
        run: ruff format --check .

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: mypy
        working-directory: backend
        run: mypy src

      - name: pytest (excludes postgres-marked tests — see the postgres-tests job)
        working-directory: backend
        run: pytest -m "not postgres"

  postgres-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meta_rne
          POSTGRES_PASSWORD: meta_rne
          POSTGRES_DB: meta_rne
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meta_rne"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Create meta_rne_test and meta_rne_migration_test
        run: |
          PGPASSWORD=meta_rne psql -h localhost -U meta_rne -d meta_rne -c "CREATE DATABASE meta_rne_test;"
          PGPASSWORD=meta_rne psql -h localhost -U meta_rne -d meta_rne -c "CREATE DATABASE meta_rne_migration_test;"

      - name: pytest -m postgres
        working-directory: backend
        env:
          ADMIN_DATABASE_URL: postgresql+psycopg://meta_rne:meta_rne@localhost:5432/meta_rne
          TEST_DATABASE_URL: postgresql+psycopg://meta_rne:meta_rne@localhost:5432/meta_rne_test
          MIGRATION_TEST_DATABASE_URL: postgresql+psycopg://meta_rne:meta_rne@localhost:5432/meta_rne_migration_test
        run: pytest -m postgres

      # GitHub Actions service containers (and their volumes) are removed
      # automatically when the job finishes — no explicit teardown step
      # needed, and this job never touches docker-compose.yml's `db`
      # service or its `pgdata` volume.

  compose-smoke:
    # Real Docker Compose smoke validation (Day 6A) — builds the actual
    # image, starts real db + api services, and drives real HTTP traffic
    # against them. Independent of postgres-tests: no shared service
    # container, since docker compose brings up its own disposable `db`.
    # scripts/compose_smoke.py is the single authoritative implementation
    # of the smoke flow — this job only invokes it, no smoke logic is
    # duplicated in YAML.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: docker compose config --quiet
        run: docker compose config --quiet

      - name: Run Compose smoke validation
        run: |
          python scripts/compose_smoke.py \
            --project-name meta-rne-smoke \
            --api-port 58080 \
            --db-port 55432

      - name: Defense-in-depth cleanup (project-scoped, always)
        if: always()
        run: docker compose --project-name meta-rne-smoke down --volumes --remove-orphans

  frontend:
    # Frontend verification (Day 6B) — independent of the backend jobs
    # above: no PostgreSQL, no Docker. Builds the React/TypeScript/Vite
    # dashboard app in frontend/ and runs its own lint/typecheck/test/build
    # pipeline against pinned exact dependency versions
    # (frontend/package-lock.json).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install pinned npm
        run: npm install --global npm@11.6.2

      - name: Report Node and npm versions
        run: |
          node --version
          npm --version

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: prettier --check
        working-directory: frontend
        run: npm run format:check

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: tsc -b
        working-directory: frontend
        run: npm run typecheck

      - name: vitest run
        working-directory: frontend
        run: npm test -- --run

      - name: vite build
        working-directory: frontend
        run: npm run build
